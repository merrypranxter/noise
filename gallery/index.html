<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>noise_fields — Interactive Gallery v0.3.0</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #sidebar {
    width: 260px;
    min-width: 220px;
    background: #161616;
    border-right: 1px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
    overflow-y: auto;
  }
  #sidebar h1 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  #sidebar h2 { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 8px; }
  select, input[type=range] { width: 100%; }
  select {
    background: #222;
    color: #e0e0e0;
    border: 1px solid #333;
    padding: 6px 8px;
    border-radius: 4px;
    font-size: 13px;
  }
  .slider-group { display: flex; flex-direction: column; gap: 4px; }
  .slider-group label { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; }
  .slider-group label span { color: #7cf; }
  input[type=range] {
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #333;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #5af;
    cursor: pointer;
  }
  #fps {
    font-size: 11px;
    color: #555;
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid #222;
  }
  #canvas-wrap { flex: 1; position: relative; }
  canvas { width: 100%; height: 100%; display: block; }
  #recipe-label {
    position: absolute;
    bottom: 12px;
    left: 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="sidebar">
  <h1>noise_fields v0.3.0</h1>

  <div class="slider-group">
    <h2>Recipe</h2>
    <select id="recipeSelect">
      <option value="perlin_fbm">Perlin FBM</option>
      <option value="worley_cells">Worley Cells</option>
      <option value="domain_warp">Domain Warp</option>
      <option value="value_wash">Value Wash</option>
      <option value="circuit_board">Circuit Board</option>
      <option value="ocean_caustics">Deep Ocean Caustics</option>
      <option value="gabor_fabric">Gabor Fabric</option>
      <option value="fungal_growth">Fungal Growth</option>
      <option value="ridged_mountains">Ridged Mountains</option>
      <option value="curl_tendrils">Curl Tendrils</option>
    </select>
  </div>

  <h2>Parameters</h2>

  <div class="slider-group">
    <label>Frequency <span id="freqVal">2.0</span></label>
    <input type="range" id="freq" min="0.5" max="12" step="0.1" value="2.0">
  </div>
  <div class="slider-group">
    <label>Octaves <span id="octavesVal">5</span></label>
    <input type="range" id="octaves" min="1" max="10" step="1" value="5">
  </div>
  <div class="slider-group">
    <label>Warp Strength <span id="warpVal">0.50</span></label>
    <input type="range" id="warp" min="0" max="2" step="0.05" value="0.5">
  </div>
  <div class="slider-group">
    <label>Orientation (×π rad) <span id="angleVal">0.25</span></label>
    <input type="range" id="angle" min="0" max="1" step="0.01" value="0.25">
  </div>
  <div class="slider-group">
    <label>Anim Speed <span id="speedVal">0.30</span></label>
    <input type="range" id="speed" min="0" max="2" step="0.05" value="0.3">
  </div>

  <h2>Palette</h2>
  <div class="slider-group">
    <select id="paletteSelect">
      <option value="0">Greyscale</option>
      <option value="1">Thermal</option>
      <option value="2">Ocean</option>
      <option value="3">Forest</option>
      <option value="4">Acid</option>
      <option value="5">Circuit Green</option>
    </select>
  </div>

  <div id="fps">FPS: —</div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="recipe-label"></div>
</div>

<script>
// ─── WebGL boilerplate ───────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
if (!gl) { document.body.innerHTML = '<p style="color:red;padding:2rem">WebGL not supported</p>'; }

const vert = `#version 100
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }`;

// ─── Shared noise helpers (inlined) ─────────────────────────────────────────

const NOISE_HELPERS = `
precision highp float;

// --- Hash helpers ---
vec4 _nf_mod289v4(vec4 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec3 _nf_mod289v3(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec2 _nf_mod289v2(vec2 x){ return x - floor(x*(1.0/289.0))*289.0; }
vec4 _nf_perm4(vec4 x){ return _nf_mod289v4(((x*34.0)+10.0)*x); }
vec3 _nf_perm3(vec3 x){ return _nf_mod289v3(((x*34.0)+10.0)*x); }
vec4 _nf_tiSqrt(vec4 r){ return 1.79284291400159 - 0.85373472095314*r; }
vec2 _nf_fade2(vec2 t){ return t*t*t*(t*(t*6.0-15.0)+10.0); }
vec3 _nf_fade3(vec3 t){ return t*t*t*(t*(t*6.0-15.0)+10.0); }

float _nf_vh2(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
vec2  _nf_vh22(vec2 p){ return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453); }

// --- 2D Perlin ---
float perlin2(vec2 P){
  vec4 Pi=floor(P.xyxy)+vec4(0,0,1,1);
  vec4 Pf=fract(P.xyxy)-vec4(0,0,1,1);
  Pi=_nf_mod289v4(Pi);
  vec4 ix=Pi.xzxz, iy=Pi.yyww, fx=Pf.xzxz, fy=Pf.yyww;
  vec4 i=_nf_perm4(_nf_perm4(ix)+iy);
  vec4 gx=fract(i*(1.0/41.0))*2.0-1.0;
  vec4 gy=abs(gx)-0.5;
  vec4 tx=floor(gx+0.5); gx=gx-tx;
  vec2 g00=vec2(gx.x,gy.x),g10=vec2(gx.y,gy.y),g01=vec2(gx.z,gy.z),g11=vec2(gx.w,gy.w);
  vec4 n=_nf_tiSqrt(vec4(dot(g00,g00),dot(g01,g01),dot(g10,g10),dot(g11,g11)));
  g00*=n.x; g01*=n.y; g10*=n.z; g11*=n.w;
  float n00=dot(g00,vec2(fx.x,fy.x)),n10=dot(g10,vec2(fx.y,fy.y));
  float n01=dot(g01,vec2(fx.z,fy.z)),n11=dot(g11,vec2(fx.w,fy.w));
  vec2 fade=_nf_fade2(Pf.xy);
  return 2.3*mix(mix(n00,n10,fade.x),mix(n01,n11,fade.x),fade.y);
}

// --- Value noise 2D ---
float value2(vec2 p){
  vec2 i=floor(p); vec2 f=fract(p); vec2 u=_nf_fade2(f);
  float a=_nf_vh2(i),b=_nf_vh2(i+vec2(1,0)),c=_nf_vh2(i+vec2(0,1)),d=_nf_vh2(i+vec2(1,1));
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y)*2.0-1.0;
}

// --- Worley 2D (F1 euclidean) ---
float worley2(vec2 p){
  vec2 cell=floor(p); float minD=1e9;
  for(int dy=-1;dy<=1;dy++) for(int dx=-1;dx<=1;dx++){
    vec2 nb=cell+vec2(float(dx),float(dy));
    vec2 pt=nb+_nf_vh22(nb);
    float d=length(p-pt); if(d<minD) minD=d;
  }
  return clamp(minD*2.0-1.0,-1.0,1.0);
}

// --- Worley F2-F1 Manhattan ---
float worleyManhattan(vec2 p){
  vec2 cell=floor(p); float f1=1e9,f2=1e9;
  for(int dy=-1;dy<=1;dy++) for(int dx=-1;dx<=1;dx++){
    vec2 nb=cell+vec2(float(dx),float(dy));
    vec2 pt=nb+_nf_vh22(nb);
    float d=abs(p.x-pt.x)+abs(p.y-pt.y);
    if(d<f1){f2=f1;f1=d;}else if(d<f2){f2=d;}
  }
  return clamp((f2-f1)*2.0-1.0,-1.0,1.0);
}

// --- Gabor 2D ---
float gabor2(vec2 p, float freq, float angle, float bw){
  vec2 cell=floor(p); float r=0.0;
  for(int dy=-2;dy<=2;dy++) for(int dx=-2;dx<=2;dx++){
    vec2 nb=cell+vec2(float(dx),float(dy));
    vec2 kp=nb+_nf_vh22(nb);
    vec2 d=p-kp;
    float g=exp(-3.14159*bw*bw*dot(d,d));
    float s=cos(6.28318*freq*(cos(angle)*d.x+sin(angle)*d.y));
    r+=g*s;
  }
  return clamp(r,-1.0,1.0);
}

// --- Curl 2D (derived from perlin gradient) ---
vec2 curl2(vec2 p){
  const float e=0.001;
  float nx0=perlin2(p+vec2(e,0.0)),nx1=perlin2(p-vec2(e,0.0));
  float ny0=perlin2(p+vec2(0.0,e)),ny1=perlin2(p-vec2(0.0,e));
  return vec2((ny0-ny1),(nx1-nx0))/(2.0*e);
}

// --- FBM helpers ---
float fbm(vec2 p, int oct, float lac, float gain){
  float v=0.0,a=0.5,mx=0.0,fr=1.0;
  for(int i=0;i<oct;i++){v+=a*perlin2(p*fr);mx+=a;fr*=lac;a*=gain;}
  return v/mx;
}
float vfbm(vec2 p, int oct, float lac, float gain){
  float v=0.0,a=0.5,mx=0.0,fr=1.0;
  for(int i=0;i<oct;i++){v+=a*value2(p*fr);mx+=a;fr*=lac;a*=gain;}
  return v/mx;
}

// --- Ridged FBM ---
float ridged(vec2 p, int oct, float lac, float gain){
  float v=0.0,a=0.5,mx=0.0,fr=1.0;
  for(int i=0;i<oct;i++){v+=a*(1.0-abs(perlin2(p*fr)));mx+=a;fr*=lac;a*=gain;}
  return v/mx*2.0-1.0;
}

// --- Cosine palette ---
vec3 palette(float t, int pal){
  if(pal==0) return vec3(t*0.5+0.5);
  if(pal==1) return vec3(0.5)+vec3(0.5)*cos(6.28318*(vec3(0.0,0.33,0.67)+vec3(1.0,1.0,0.5)*t));
  if(pal==2) return vec3(0.12,0.22,0.45)+vec3(0.5)*cos(6.28318*(vec3(0.0,0.1,0.2)+vec3(0.6,0.9,1.0)*t));
  if(pal==3) return vec3(0.1,0.25,0.05)+vec3(0.4)*cos(6.28318*(vec3(0.0,0.15,0.4)+vec3(0.5,0.8,0.3)*t));
  if(pal==4) return vec3(0.5)+vec3(0.5)*cos(6.28318*(vec3(0.1,0.4,0.0)+vec3(1.2,0.8,0.3)*t));
  // circuit green
  float s=step(0.5,t);
  return mix(vec3(0.04,0.12,0.04),vec3(0.0,1.0,0.25),s);
}
`;

// ─── Recipe fragment shaders ─────────────────────────────────────────────────

const RECIPES = {
  perlin_fbm: {
    label: "Perlin FBM",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  float n=fbm(uv*u_freq+0.1*u_time, u_oct, 2.0, 0.5);
  gl_FragColor=vec4(palette(n*0.5+0.5, u_pal),1.0);
}`
  },
  worley_cells: {
    label: "Worley Cells",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  uv+=u_warp*vec2(sin(uv.y*2.1+u_time*0.3),cos(uv.x*1.9+u_time*0.25));
  float n=worley2(uv*u_freq);
  gl_FragColor=vec4(palette(n*0.5+0.5, u_pal),1.0);
}`
  },
  domain_warp: {
    label: "Domain Warp",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  vec2 q=vec2(fbm(uv*u_freq+u_time*0.1, u_oct,2.0,0.5),fbm(uv*u_freq+vec2(5.2,1.3)+u_time*0.1,u_oct,2.0,0.5));
  vec2 r=vec2(fbm(uv*u_freq+u_warp*q+vec2(1.7,9.2)+u_time*0.08,u_oct,2.0,0.5),
              fbm(uv*u_freq+u_warp*q+vec2(8.3,2.8)+u_time*0.08,u_oct,2.0,0.5));
  float n=fbm(uv*u_freq+u_warp*r, u_oct,2.0,0.5);
  gl_FragColor=vec4(palette(n*0.5+0.5, u_pal),1.0);
}`
  },
  value_wash: {
    label: "Value Wash (Watercolour)",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  vec2 warpOff=vec2(value2(uv*1.8+u_time*0.07),value2(uv*1.8+vec2(3.1,7.4)+u_time*0.07));
  vec2 warpedUV=uv+u_warp*0.4*warpOff;
  float n=vfbm(warpedUV*u_freq, u_oct, 2.1, 0.55);
  float grain=gabor2(uv*u_freq*3.0, 2.5, u_angle*3.14159, 2.0)*0.06;
  gl_FragColor=vec4(palette(n*0.5+0.5+grain, u_pal),1.0);
}`
  },
  circuit_board: {
    label: "Circuit Board",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  vec2 jitter=vec2(value2(uv*8.0),value2(uv*8.0+vec2(1.7,3.3)))*0.03*u_warp;
  float traces=worleyManhattan((uv+jitter)*u_freq);
  float thr=step(0.0,traces-0.1);
  // chebyshev pads approximation
  vec2 cell2=floor((uv+jitter)*u_freq);
  vec2 cFrac=fract((uv+jitter)*u_freq)-0.5;
  float cheb=max(abs(cFrac.x),abs(cFrac.y));
  float pads=1.0-step(0.18,cheb);
  float n=clamp(thr+pads,0.0,1.0);
  gl_FragColor=vec4(palette(n, 5),1.0);
}`
  },
  ocean_caustics: {
    label: "Deep Ocean Caustics",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  float t=u_time;
  vec2 warpQ=vec2(perlin2(uv*1.2+t*0.15),perlin2(uv*1.2+vec2(4.1,2.3)+t*0.12));
  vec2 warpedUV=uv+u_warp*0.5*warpQ;
  float c1=worley2(warpedUV*u_freq+t*0.3);
  float c2=worley2(warpedUV*u_freq*1.4+t*0.4+vec2(1.3,2.7));
  float n=pow(c1*0.5+0.5,0.6)*0.6+(c2*0.5+0.5)*0.4;
  gl_FragColor=vec4(palette(n, u_pal==0?2:u_pal),1.0);
}`
  },
  gabor_fabric: {
    label: "Gabor Fabric",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  float a=u_angle*3.14159;
  float g0=gabor2(uv*u_freq, 6.0, a, 1.5);
  float g1=gabor2(uv*u_freq, 6.0, a+1.5708, 1.5);
  float n=(g0+g1)*0.5;
  gl_FragColor=vec4(palette(n*0.5+0.5, u_pal),1.0);
}`
  },
  fungal_growth: {
    label: "Fungal Growth",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  vec2 cv=curl2(uv*1.5+u_time*0.08)*u_warp;
  vec2 warpedUV=uv+cv;
  float cells=worley2(warpedUV*u_freq);
  float ridge=ridged(warpedUV*u_freq*0.8, u_oct, 2.0, 0.5);
  float n=cells*0.6+ridge*0.4;
  float thr=smoothstep(0.3,0.5,n*0.5+0.5);
  gl_FragColor=vec4(palette(thr, u_pal==0?3:u_pal),1.0);
}`
  },
  ridged_mountains: {
    label: "Ridged Mountains",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  vec2 warpQ=vec2(fbm(uv*0.8, 3,2.0,0.5),fbm(uv*0.8+vec2(1.7,9.2),3,2.0,0.5))*u_warp*0.4;
  float n=ridged((uv+warpQ)*u_freq, u_oct, 1.9, 0.5);
  gl_FragColor=vec4(palette(n*0.5+0.5, u_pal),1.0);
}`
  },
  curl_tendrils: {
    label: "Curl Tendrils",
    frag: `
uniform vec2 u_res; uniform float u_time;
uniform float u_freq; uniform int u_oct; uniform float u_warp; uniform float u_angle; uniform int u_pal;
void main(){
  vec2 uv=(gl_FragCoord.xy/u_res)*2.0-1.0;
  uv.x*=u_res.x/u_res.y;
  vec2 cv=curl2(uv*u_freq+u_time*0.1)*u_warp;
  float n=fbm(uv*u_freq+cv, u_oct,2.0,0.5);
  n=n*0.5+0.5;
  float edge=abs(fract(n*6.0)-0.5)*2.0;
  gl_FragColor=vec4(palette(edge, u_pal),1.0);
}`
  }
};

// ─── Shader compile helpers ───────────────────────────────────────────────────

function compile(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}

function link(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, vs);
  gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    console.error(gl.getProgramInfoLog(p));
  return p;
}

const vs = compile(vert, gl.VERTEX_SHADER);

const programs = {};
for (const [key, recipe] of Object.entries(RECIPES)) {
  const fragSrc = `#version 100\nprecision highp float;\n${NOISE_HELPERS}\n${recipe.frag}`;
  const fs = compile(fragSrc, gl.FRAGMENT_SHADER);
  programs[key] = link(vs, fs);
}

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

// ─── State ────────────────────────────────────────────────────────────────────

let currentRecipe = 'perlin_fbm';
let startTime = performance.now();
let lastFrame = performance.now();
let frameCount = 0;

const sliders = {
  freq: document.getElementById('freq'),
  octaves: document.getElementById('octaves'),
  warp: document.getElementById('warp'),
  angle: document.getElementById('angle'),
  speed: document.getElementById('speed'),
};
const labels = {
  freq: document.getElementById('freqVal'),
  octaves: document.getElementById('octavesVal'),
  warp: document.getElementById('warpVal'),
  angle: document.getElementById('angleVal'),
  speed: document.getElementById('speedVal'),
};

for (const [k, el] of Object.entries(sliders)) {
  el.addEventListener('input', () => {
    labels[k].textContent = parseFloat(el.value).toFixed(2).replace(/\.?0+$/, s => s === '.00' ? '' : s);
    labels[k].textContent = parseFloat(el.value).toFixed(2);
  });
}

document.getElementById('recipeSelect').addEventListener('change', e => {
  currentRecipe = e.target.value;
  document.getElementById('recipe-label').textContent = RECIPES[currentRecipe].label;
});
document.getElementById('recipe-label').textContent = RECIPES[currentRecipe].label;

// ─── Render loop ──────────────────────────────────────────────────────────────

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth * devicePixelRatio | 0;
  canvas.height = wrap.clientHeight * devicePixelRatio | 0;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

function render(now) {
  requestAnimationFrame(render);

  const elapsed = (now - startTime) * 0.001 * parseFloat(sliders.speed.value);
  const prog = programs[currentRecipe];
  gl.useProgram(prog);

  const pos = gl.getAttribLocation(prog, 'a_pos');
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

  gl.uniform2f(gl.getUniformLocation(prog, 'u_res'), canvas.width, canvas.height);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_time'), elapsed);
  gl.uniform1f(gl.getUniformLocation(prog, 'u_freq'), parseFloat(sliders.freq.value));
  gl.uniform1i(gl.getUniformLocation(prog, 'u_oct'), parseInt(sliders.octaves.value));
  gl.uniform1f(gl.getUniformLocation(prog, 'u_warp'), parseFloat(sliders.warp.value));
  gl.uniform1f(gl.getUniformLocation(prog, 'u_angle'), parseFloat(sliders.angle.value));
  gl.uniform1i(gl.getUniformLocation(prog, 'u_pal'), parseInt(document.getElementById('paletteSelect').value));

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // FPS
  frameCount++;
  const dt = now - lastFrame;
  if (dt >= 500) {
    document.getElementById('fps').textContent = `FPS: ${(frameCount / (dt * 0.001)).toFixed(0)}`;
    frameCount = 0;
    lastFrame = now;
  }
}
requestAnimationFrame(render);
</script>
</body>
</html>
